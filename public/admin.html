<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarik Bhai AI - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 400px; width: 100%; border-radius: 0.5rem; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans">
    <div id="login-screen" class="min-h-screen flex items-center justify-center">
        <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-96">
            <h2 class="text-2xl font-bold mb-6 text-center text-[#FFD700]">Admin Login</h2>
            <input type="text" id="username" placeholder="Username" class="w-full bg-gray-700 text-white px-4 py-2 rounded mb-4 focus:outline-none focus:ring-2 focus:ring-[#FFD700]">
            <input type="password" id="password" placeholder="Password" class="w-full bg-gray-700 text-white px-4 py-2 rounded mb-6 focus:outline-none focus:ring-2 focus:ring-[#FFD700]">
            <button onclick="login()" class="w-full bg-[#FFD700] text-gray-900 font-bold py-2 rounded hover:bg-yellow-400 transition-colors">Login</button>
            <p id="login-error" class="text-red-500 text-sm mt-4 text-center hidden">Invalid credentials</p>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden min-h-screen p-6">
        <header class="flex justify-between items-center mb-8 border-b border-gray-700 pb-4">
            <h1 class="text-3xl font-bold text-[#FFD700]">Tarik Bhai AI - Live Dashboard</h1>
            <button onclick="logout()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded text-white font-medium transition-colors">Logout</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
                <h3 class="text-gray-400 text-sm font-medium uppercase tracking-wider">Total Users</h3>
                <p id="stat-users" class="text-4xl font-bold mt-2 text-blue-400">0</p>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
                <h3 class="text-gray-400 text-sm font-medium uppercase tracking-wider">Total Chats</h3>
                <p id="stat-chats" class="text-4xl font-bold mt-2 text-green-400">0</p>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-red-900/50 border-red-500/30">
                <h3 class="text-red-400 text-sm font-bold uppercase tracking-wider flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                    Active Emergencies
                </h3>
                <p id="stat-emergencies" class="text-4xl font-bold mt-2 text-red-500">0</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700 flex flex-col">
                <h2 class="text-xl font-bold mb-4 text-white flex items-center gap-2">
                    Live Map Tracking
                </h2>
                <div id="map" class="flex-grow"></div>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700 flex flex-col">
                <h2 class="text-xl font-bold mb-4 text-white">Recent Emergencies</h2>
                <div class="overflow-y-auto max-h-[400px] pr-2 custom-scrollbar space-y-4" id="emergencies-list">
                    <!-- Emergencies will be populated here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('admin_token');
        let map;
        let markers = {};
        let polylines = {};

        if (token) {
            showDashboard();
        }

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                if (res.ok) {
                    const data = await res.json();
                    token = data.token;
                    localStorage.setItem('admin_token', token);
                    showDashboard();
                } else {
                    document.getElementById('login-error').classList.remove('hidden');
                }
            } catch (e) {
                console.error(e);
            }
        }

        function logout() {
            localStorage.removeItem('admin_token');
            token = null;
            document.getElementById('dashboard-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        }

        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
            setTimeout(() => {
                initMap();
                fetchData();
            }, 100);
            setInterval(fetchData, 5000); // Poll every 5 seconds
        }

        function initMap() {
            if (!map) {
                map = L.map('map').setView([20.5937, 78.9629], 5); // Center of India
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                    subdomains: 'abcd',
                    maxZoom: 20
                }).addTo(map);
            } else {
                map.invalidateSize();
            }
        }

        async function fetchData() {
            if (!token) return;

            try {
                const [statsRes, emergenciesRes, locationsRes] = await Promise.all([
                    fetch('/api/admin/stats', { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch('/api/admin/emergencies', { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch('/api/admin/locations', { headers: { 'Authorization': `Bearer ${token}` } })
                ]);

                if (statsRes.status === 401) return logout();

                const stats = await statsRes.json();
                const emergencies = await emergenciesRes.json();
                const locations = await locationsRes.json();

                // Update Stats
                document.getElementById('stat-users').innerText = stats.totalUsers;
                document.getElementById('stat-chats').innerText = stats.totalChats;
                document.getElementById('stat-emergencies').innerText = stats.totalEmergencies;

                // Update Emergencies List
                const emergenciesList = document.getElementById('emergencies-list');
                emergenciesList.innerHTML = emergencies.map(e => `
                    <div class="bg-red-900/20 border border-red-500/30 p-4 rounded-lg">
                        <div class="flex justify-between items-start mb-2">
                            <span class="font-bold text-red-400">User ID: ${e.userId.substring(0, 8)}...</span>
                            <span class="text-xs text-gray-400">${new Date(e.timestamp).toLocaleString()}</span>
                        </div>
                        <p class="text-sm text-gray-300 mb-2">${e.location}</p>
                        <a href="${e.mapsLink || '#'}" target="_blank" class="text-xs bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded inline-block transition-colors">View on Maps</a>
                    </div>
                `).join('');

                // Update Map
                updateMap(locations, emergencies);

            } catch (e) {
                console.error("Failed to fetch admin data", e);
            }
        }

        function updateMap(locations, emergencies) {
            const activeEmergencyUserIds = new Set(emergencies.filter(e => e.status === 'active').map(e => e.userId));

            for (const userId in locations) {
                const userLocs = locations[userId];
                if (userLocs.length === 0) continue;

                const latestLoc = userLocs[userLocs.length - 1];
                const isDanger = activeEmergencyUserIds.has(userId);
                
                const color = isDanger ? 'red' : '#3b82f6';
                const fillColor = isDanger ? '#ef4444' : '#60a5fa';

                // Update or create marker
                if (markers[userId]) {
                    markers[userId].setLatLng([latestLoc.lat, latestLoc.lng]);
                    markers[userId].setStyle({ color, fillColor });
                } else {
                    markers[userId] = L.circleMarker([latestLoc.lat, latestLoc.lng], {
                        radius: 8,
                        color: color,
                        fillColor: fillColor,
                        fillOpacity: 0.8,
                        weight: 2
                    }).addTo(map).bindPopup(`User: ${userId}`);
                }

                // Update or create polyline (movement path)
                const latlngs = userLocs.map(loc => [loc.lat, loc.lng]);
                if (polylines[userId]) {
                    polylines[userId].setLatLngs(latlngs);
                    polylines[userId].setStyle({ color: isDanger ? 'red' : '#3b82f6' });
                } else {
                    polylines[userId] = L.polyline(latlngs, {
                        color: isDanger ? 'red' : '#3b82f6',
                        weight: 3,
                        opacity: 0.5,
                        dashArray: '5, 10'
                    }).addTo(map);
                }
            }
        }
    </script>
</body>
</html>
